databases:
  - name: sighidro-db
    databaseName: sighidro
    user: sighidro
    plan: free

services:
  - type: web
    name: sighidro-api
    env: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://sighidro-web.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: sighidro-db
          property: connectionString

  - type: static_site
    name: sighidro-web
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SIGHIDRO_BACKEND
        value: api
      - key: VITE_API_BASE_URL
        value: https://sighidro-api.onrender.com
