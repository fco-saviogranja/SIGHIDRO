databases:
  - name: sighidro-db-202607
    databaseName: sighidro
    user: sighidro
    plan: free

services:
  - type: web
    name: sighidro-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: ALLOW_IN_MEMORY_DB
        value: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: controleinterno.jardimce@gmail.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        value: https://sighidro.tech,https://www.sighidro.tech,https://sighidro-web.onrender.com
      - key: EXTERNAL_DATABASE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: sighidro-db-202607
          property: connectionString

  - type: web
    name: sighidro-web
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SIGHIDRO_BACKEND
        value: api
      - key: VITE_API_BASE_URL
        value: https://sighidro-api.onrender.com
      - key: VITE_ADMIN_EMAIL
        value: controleinterno.jardimce@gmail.com
