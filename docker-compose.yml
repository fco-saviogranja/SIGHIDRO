services:
  postgres:
    image: postgres:16-alpine
    container_name: sighidro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sighidro
      POSTGRES_USER: sighidro
      POSTGRES_PASSWORD: sighidro
    ports:
      - "5432:5432"
    volumes:
      - sighidro-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sighidro -d sighidro"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sighidro-postgres-data:
